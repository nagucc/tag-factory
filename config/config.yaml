app:
  name: Tag Factory
  description: 数据对象标签管理应用
  version: 1.0.0
  env: development
  port: 8080
  host: 0.0.0.0
database:
  mysql:
    host: localhost
    port: 3306
    username: root
    password: root123
    database: mydb
    pool:
      max: 10
      min: 0
      acquire: 30000
      idle: 10000
    sync: false
  mongodb:
    host: localhost
    port: 27017
    username: root
    password: root123
    database: mymongo
    enabled: true
jwt:
  secret: your-secret-key-change-in-production
  expiresIn: 7d
  issuer: tag-factory
  audience: tag-factory-users
security:
  bcryptRounds: 10
  maxLoginAttempts: 5
  lockoutDuration: 30
  cors:
    enabled: true
    origins:
      - http://localhost:8080
      - http://localhost:3001
    methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    credentials: true
cas:
  enabled: true
  serverUrl: https://ids.ynu.edu.cn
  pathPrefix: /authserver
  version: '3.0'
  strictSSL: true
  attributeMapping:
    username: username
    email: email
    name: name
  defaultRoleId: 2
oauth:
  github:
    enabled: false
    clientId: ''
    clientSecret: ''
    callbackUrl: ''
  google:
    enabled: false
    clientId: ''
    clientSecret: ''
    callbackUrl: ''
openai:
  enabled: false
  apiKey: ''
  model: gpt-3.5-turbo
  temperature: 0.7
  maxTokens: 2000
  timeout: 30000
logging:
  level: info
  output: console
  filePath: ./logs/app.log
  requestLog: true
  auditLog: true
sync:
  batchSize: 1000
  timeout: 300000
  retryCount: 3
  retryInterval: 5000
upload:
  maxSize: 50
  allowedTypes:
    - image/jpeg
    - image/png
    - image/gif
    - application/pdf
    - application/vnd.ms-excel
    - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
    - text/csv
  storagePath: ./uploads
cache:
  type: memory
  ttl: 3600
  redis:
    host: localhost
    port: 6379
    password: ''
    db: 0
email:
  enabled: false
  smtp:
    host: ''
    port: 587
    secure: false
    auth:
      user: ''
      pass: ''
  from: noreply@tagfactory.local
  adminEmails: []
features:
  registration: true
  aiTagging: false
  auditLog: true
  monitoring: true
  dataExport: true
pagination:
  defaultPageSize: 20
  pageSizeOptions:
    - 10
    - 20
    - 50
    - 100
  maxPageSize: 1000
